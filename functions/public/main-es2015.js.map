export default "<div *ngFor=\"let message of messages\" >\n    <div class=\"row\">\n        <div class=\"col-xs-12\">\n            <div *ngIf=\"message.type=='joined'||message.type=='left'\" class=\"joined\">     \n                <div *ngIf=\"message.sender==userData.name\" >\n                    <button>You {{message.type}}.</button>\n                </div>   \n                <div *ngIf=\"message.sender!=userData.name\">\n                    <button>{{message.sender}} {{message.type}}.</button>\n                </div>   \n            </div>\n            \n            <div *ngIf=\"message.sender!=userData.name && message.type=='send' \"  class=\"item\">\n                <i>{{message.sender}}</i>\n                <h5>{{message.text}}</h5>\n                <i>{{message.date| date:'short':'+0530'}}</i> \n            </div>\n            <div *ngIf=\"message.sender==userData.name && message.type=='send'\" class=\"item2\">\n                <h5>{{message.text}}</h5>\n                <i> {{message.date| date:'short':'+0530'}}</i> \n            </div>\n        </div>\n    </div>\n</div>"
