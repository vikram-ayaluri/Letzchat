export default "<input  [(ngModel)]=\"message\"    (keyup)=\"submit($event)\"\n    placeholder=\"type a message\" type=\"text\" size=\"33\"   >\n<button     (click)=\"send()\"\n        style=\"color: rgb(255, 255, 255); background-color: green;\">\n    <i class=\"fa fa-paper-plane\" aria-hidden=\"true\"></i>\n</button>"
